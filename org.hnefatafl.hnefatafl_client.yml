app-id: org.hnefatafl.hnefatafl_client
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: org.hnefatafl.hnefatafl_client
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
finish-args:
  - --share=ipc
  - --socket=pulseaudio
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
modules:
  - name: hnefatafl_client
    buildsystem: simple
    sources:
      - type: git
        url: https://codeberg.org/dcampbell/hnefatafl.git
        # git show-ref --tags
        commit: 6f64bacdb14ccb7af79d2fd033fcb999650be8fd
        tag: v5.11.0-1
      - type: file
        url: https://codeberg.org/dcampbell/hnefatafl/raw/branch/main/packages/org.hnefatafl.hnefatafl_client.metainfo.xml
        sha256: 215a0218f4fc82fba43b6e154c50b8acd23ddf2052aa281432722ecb0b0aefce
      - cargo-sources.json

    build-options:
      append-path: /usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        CARGO_HOME: /run/build/hnefatafl_client/cargo
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: clang
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=/usr/lib/sdk/rust-stable/bin/mold
        CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
        CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=/usr/lib/sdk/rust-stable/bin/mold
    build-commands:
      - sed -i 's/cargo-/flathub-/' src/bin/hnefatafl-client/main.rs
      - source /usr/lib/sdk/rust-stable/enable.sh && cargo --offline build --release --bin hnefatafl-client --features client,icon_2 --no-default-features
      - install -Dm755 target/release/hnefatafl-client /app/bin/$FLATPAK_ID
      - install -Dm644 website/src/images/helmet.svg /app/share/icons/hicolor/scalable/apps/$FLATPAK_ID.svg
      - install -Dm644 packages/$FLATPAK_ID.desktop -t /app/share/applications
      - install -Dm644 $FLATPAK_ID.metainfo.xml -t /app/share/metainfo
